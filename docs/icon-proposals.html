<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Expense Tracker · Propuestas de iconografía</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --background: #f5f9ff;
    --surface: #ffffff;
    --surface-soft: #eef6ff;
    --line: #d8e7f5;
    --ink: #213547;
    --muted: #6f8296;
    --primary-strong: #4d96c8;
    --primary-ink: #173044;
    --radius-lg: 24px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Nunito", system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(90% 40% at 50% 0%, rgba(142, 202, 230, 0.28), transparent 60%),
      #e9f3fb;
    padding: 32px 20px 80px;
  }
  .page-head { max-width: 1200px; margin: 0 auto 28px; text-align: center; }
  .page-head h1 { font-size: 30px; font-weight: 900; margin: 0 0 6px; }
  .page-head p { color: var(--muted); font-size: 15px; margin: 0 auto; max-width: 620px; }
  .grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    align-items: start;
  }
  @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: 0 18px 45px rgba(69, 122, 168, 0.12);
  }
  .panel-head { margin-bottom: 4px; }
  .panel-tag {
    display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: .5px;
    text-transform: uppercase; color: var(--primary-strong);
    background: var(--surface-soft); padding: 4px 10px; border-radius: 999px;
  }
  .panel h2 { font-size: 20px; font-weight: 900; margin: 10px 0 4px; }
  .panel .desc { font-size: 13px; color: var(--muted); margin: 0 0 16px; line-height: 1.45; }

  .section-label {
    font-size: 11px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase;
    color: var(--muted); margin: 20px 0 10px;
  }

  /* Category grid inside each panel */
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px 6px; }
  .cat { display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
  .cat .lbl { font-size: 9.5px; font-weight: 700; color: var(--muted); line-height: 1.15; }

  .ico { display: grid; place-items: center; }
  .ico svg { stroke-width: 2.2; }

  /* --- Style A: Duotone suave (tinte pastel + ícono color fuerte) --- */
  .A .ico { width: 46px; height: 46px; border-radius: 14px; }
  .A .ico svg { width: 22px; height: 22px; }

  /* --- Style B: Sólido vibrante (círculo lleno + ícono blanco) --- */
  .B .ico { width: 46px; height: 46px; border-radius: 999px; box-shadow: 0 6px 14px rgba(30,60,90,.16); }
  .B .ico svg { width: 22px; height: 22px; color: #fff; }

  /* --- Style C: Emoji cálido (glifo emoji en burbuja neutra) --- */
  .C .ico { width: 46px; height: 46px; border-radius: 16px; font-size: 24px; background: var(--surface-soft); border: 1px solid var(--line); }

  /* Demo rows: how it looks in the real UI */
  .demo { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
  .row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface-soft); border-radius: 16px; padding: 10px 12px;
  }
  .row .r-ico { flex: none; }
  .A .row .r-ico { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; }
  .A .row .r-ico svg { width: 19px; height: 19px; }
  .B .row .r-ico { width: 38px; height: 38px; border-radius: 999px; display: grid; place-items: center; }
  .B .row .r-ico svg { width: 19px; height: 19px; color: #fff; }
  .C .row .r-ico { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; font-size: 20px; background: #fff; border: 1px solid var(--line); }
  .row .r-body { flex: 1; min-width: 0; }
  .row .r-title { font-weight: 800; font-size: 13px; }
  .row .r-sub { font-size: 11px; color: var(--muted); }
  .row .r-amt { font-weight: 900; font-size: 13px; }

  /* Section header icons demo */
  .sec-demo { display: flex; flex-wrap: wrap; gap: 8px; }
  .sec-chip {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--surface-soft); border: 1px solid var(--line);
    border-radius: 999px; padding: 7px 13px; font-size: 12px; font-weight: 800;
  }
  .A .sec-chip .s-ico, .B .sec-chip .s-ico { display: grid; place-items: center; width: 26px; height: 26px; border-radius: 8px; }
  .B .sec-chip .s-ico svg { color:#fff; }
  .sec-chip .s-ico svg { width: 15px; height: 15px; }
  .C .sec-chip .s-ico { font-size: 16px; }

  .note { font-size: 11px; color: var(--muted); margin-top: 14px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="page-head">
    <h1>Iconografía de categorías — 3 propuestas</h1>
    <p>Misma paleta y tipografía de la app (Nunito + celeste pastel). Cada panel muestra las 20 categorías, cómo se ve en una fila de gasto real, y los íconos de las secciones. Elegí una dirección.</p>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    // Fuente de verdad: 20 categorías con pastel (actual), color vivo (nuevo), ícono lucide y emoji.
    const CATS = [
      { name:"Supermercado",        pastel:"#8ecae6", vivid:"#2f93e6", lucide:"shopping-cart", emoji:"🛒" },
      { name:"Verdulería/Almacén",  pastel:"#95d5b2", vivid:"#37ab6f", lucide:"carrot",        emoji:"🥬" },
      { name:"Delivery",            pastel:"#ffd6a5", vivid:"#f0951f", lucide:"bike",          emoji:"🛵" },
      { name:"Restaurantes/Cafés",  pastel:"#ffcad4", vivid:"#ea6f97", lucide:"utensils",      emoji:"🍽️" },
      { name:"Transporte",          pastel:"#bde0fe", vivid:"#4390ea", lucide:"bus",           emoji:"🚌" },
      { name:"Nafta/Peajes",        pastel:"#a2d2ff", vivid:"#3a78d6", lucide:"fuel",          emoji:"⛽" },
      { name:"Compras Hogar",       pastel:"#cdb4db", vivid:"#9663c9", lucide:"sofa",          emoji:"🛋️" },
      { name:"Expensas",            pastel:"#b8c0ff", vivid:"#6f7be6", lucide:"building-2",    emoji:"🏢" },
      { name:"Mascotas",            pastel:"#b7e4c7", vivid:"#3fae78", lucide:"paw-print",     emoji:"🐾" },
      { name:"Servicios/Impuestos", pastel:"#bee1e6", vivid:"#2fa3b5", lucide:"receipt-text",  emoji:"🧾" },
      { name:"Salud/Farmacia",      pastel:"#caffbf", vivid:"#46b06a", lucide:"pill",          emoji:"💊" },
      { name:"Consultorio",         pastel:"#a3c4f3", vivid:"#4680de", lucide:"stethoscope",   emoji:"🩺" },
      { name:"Ropa",                pastel:"#ffc8dd", vivid:"#e56ba0", lucide:"shirt",         emoji:"👕" },
      { name:"Educación",           pastel:"#fdffb6", vivid:"#d3ac1f", lucide:"graduation-cap",emoji:"🎓" },
      { name:"Ocio/Suscripciones",  pastel:"#d0f4de", vivid:"#33b184", lucide:"clapperboard",  emoji:"🎬" },
      { name:"Viajes",              pastel:"#caf0f8", vivid:"#2ba4cd", lucide:"plane",         emoji:"✈️" },
      { name:"Banco/Comisiones",    pastel:"#e2e2df", vivid:"#7a8794", lucide:"landmark",      emoji:"🏦" },
      { name:"Familia/Bebé",        pastel:"#f1c0e8", vivid:"#d16ec0", lucide:"baby",          emoji:"👶" },
      { name:"Regalos",             pastel:"#ffc6ff", vivid:"#d16edb", lucide:"gift",          emoji:"🎁" },
      { name:"Otros",               pastel:"#d8e2dc", vivid:"#8493a0", lucide:"shapes",        emoji:"📦" },
    ];

    // Secciones de la app (tab bar + headers del dashboard)
    const SECTIONS = [
      { name:"Inicio",     lucide:"home",        emoji:"🏠" },
      { name:"Cargar",     lucide:"plus-circle", emoji:"➕" },
      { name:"Importar",   lucide:"file-up",     emoji:"📤" },
      { name:"Revisar",    lucide:"list-checks", emoji:"✅" },
      { name:"Voz",        lucide:"mic",         emoji:"🎙️" },
      { name:"Categorías", lucide:"pie-chart",   emoji:"📊" },
    ];

    // color-mix helper para tinte pastel de fondo en Style A
    const tint = (hex, pct) => `color-mix(in srgb, ${hex} ${pct}%, white)`;

    const STYLES = [
      {
        key:"A", tag:"Propuesta A", title:"Duotono suave",
        desc:"Ícono lineal en color fuerte sobre un cuadrado de tinte pastel. Calmo, prolijo, encaja perfecto con la paleta actual. Vibe Notion/iOS.",
        note:"Íconos: Lucide (ya está en el proyecto). Bajo riesgo visual, máxima coherencia."
      },
      {
        key:"B", tag:"Propuesta B", title:"Sólido vibrante",
        desc:"Ícono blanco sobre un círculo lleno de color saturado. Punchy, alto contraste, energía tipo Temu/Shopee. Hace que la grilla \"grite\" categoría.",
        note:"Íconos: Lucide. Requiere una paleta vívida nueva (más saturada que la pastel actual)."
      },
      {
        key:"C", tag:"Propuesta C", title:"Emoji cálido",
        desc:"Emoji dentro de una burbuja neutra. Instantáneamente colorido y humano, cero librería de íconos, súper rápido de shipear. Menos \"premium\", más casual.",
        note:"Sin dependencias. Ojo: el render del emoji cambia según sistema operativo."
      },
    ];

    const grid = document.getElementById("grid");

    STYLES.forEach(st => {
      const panel = document.createElement("div");
      panel.className = "panel " + st.key;

      // category cells
      const cells = CATS.map(c => {
        let iconStyle = "", inner = "";
        if (st.key === "A") { iconStyle = `background:${tint(c.pastel,55)};color:${c.vivid}`; inner = `<i data-lucide="${c.lucide}"></i>`; }
        if (st.key === "B") { iconStyle = `background:${c.vivid}`; inner = `<i data-lucide="${c.lucide}"></i>`; }
        if (st.key === "C") { inner = c.emoji; }
        return `<div class="cat"><div class="ico" style="${iconStyle}">${inner}</div><div class="lbl">${c.name}</div></div>`;
      }).join("");

      // demo rows (2 example expenses)
      const demoCats = [CATS[0], CATS[3], CATS[12]]; // super, restaurante, ropa
      const rows = demoCats.map(c => {
        let iconStyle = "", inner = "";
        if (st.key === "A") { iconStyle = `background:${tint(c.pastel,55)};color:${c.vivid}`; inner = `<i data-lucide="${c.lucide}"></i>`; }
        if (st.key === "B") { iconStyle = `background:${c.vivid}`; inner = `<i data-lucide="${c.lucide}"></i>`; }
        if (st.key === "C") { inner = c.emoji; }
        const amt = c.name==="Supermercado"?"$42.300": c.name==="Restaurantes/Cafés"?"$18.900":"$27.500";
        const merch = c.name==="Supermercado"?"Coto · Guido": c.name==="Restaurantes/Cafés"?"Mostaza · Dalu":"Zara · Dalu";
        return `<div class="row"><div class="r-ico" style="${iconStyle}">${inner}</div><div class="r-body"><div class="r-title">${c.name}</div><div class="r-sub">${merch}</div></div><div class="r-amt">${amt}</div></div>`;
      }).join("");

      // section chips
      const chips = SECTIONS.map(s => {
        let iconStyle = "", inner = "";
        if (st.key === "A") { iconStyle = `background:${tint("#8ecae6",55)};color:${"#4d96c8"}`; inner = `<i data-lucide="${s.lucide}"></i>`; }
        if (st.key === "B") { iconStyle = `background:${"#4d96c8"}`; inner = `<i data-lucide="${s.lucide}"></i>`; }
        if (st.key === "C") { inner = s.emoji; }
        return `<span class="sec-chip"><span class="s-ico" style="${iconStyle}">${inner}</span>${s.name}</span>`;
      }).join("");

      panel.innerHTML = `
        <div class="panel-head">
          <span class="panel-tag">${st.tag}</span>
          <h2>${st.title}</h2>
          <p class="desc">${st.desc}</p>
        </div>
        <div class="section-label">Las 20 categorías</div>
        <div class="cat-grid">${cells}</div>
        <div class="section-label">En una fila de gasto</div>
        <div class="demo">${rows}</div>
        <div class="section-label">Íconos de secciones</div>
        <div class="sec-demo">${chips}</div>
        <p class="note">${st.note}</p>
      `;
      grid.appendChild(panel);
    });

    lucide.createIcons();
  </script>
</body>
</html>
